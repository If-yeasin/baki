name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ios-production:
    runs-on: ubuntu-latest
    env:
      BAKI_DB_TESTS_REQUIRED: "true"
      BAKI_DB_TYPES_REQUIRED: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @baki/db exec supabase db start --workdir ../..
      - run: pnpm --filter @baki/db exec supabase db reset --workdir ../..
      - run: pnpm db:types:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm i18n:check
      - run: pnpm db:check
      - run: pnpm --filter mobile check:assets
      - run: pnpm e2e:auth:check
      - run: pnpm release:safety
      - run: pnpm check
      - run: git diff --check
      - run: pnpm dlx eas-cli@latest build --profile production --platform ios --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_ENV: production
          EXPO_PUBLIC_APP_CHANNEL: production
          EXPO_PUBLIC_E2E_MODE: "false"
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
