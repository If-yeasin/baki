name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @baki/db exec supabase db start --workdir ../..
      - run: pnpm --filter @baki/db exec supabase db reset --workdir ../..
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm i18n:check
      - run: pnpm db:check
      - run: pnpm --filter mobile check:assets
      - run: pnpm check
      - run: git diff --check
